<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mi Carrito</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-3">Mi Carrito de Compras</h2>

    <div th:if="${#lists.isEmpty(items)}" class="alert alert-info">
        Tu carrito está vacío.
        <a href="/" class="alert-link">Ir al catálogo</a>
    </div>

    <div th:unless="${#lists.isEmpty(items)}" class="row">
        <div class="col-md-8">
            <table class="table align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td class="d-flex align-items-center gap-2">
                        <img th:src="@{/uploads/{img}(img=${item.imagen})}"
                             th:if="${item.imagen != null}"
                             style="width:50px;height:50px;object-fit:cover;border-radius:6px">
                        <span th:text="${item.nombre}"></span>
                    </td>
                    <td th:text="'S/. ' + ${#numbers.formatDecimal(item.precioUnitario,1,2)}"></td>
                    <td>
                        <!-- Usa los endpoints reales de tu CarritoController: aumentar/reducir -->
                        <div class="d-flex align-items-center gap-1">
                            <form th:action="@{/carrito/reducir/{id}(id=${item.productoId})}"
                                  method="post">
                                <button type="submit" class="btn btn-outline-secondary btn-sm">-</button>
                            </form>
                            <span class="px-2" th:text="${item.cantidad}"></span>
                            <form th:action="@{/carrito/aumentar/{id}(id=${item.productoId})}"
                                  method="post">
                                <button type="submit" class="btn btn-outline-secondary btn-sm">+</button>
                            </form>
                        </div>
                    </td>
                    <td>
                        <strong th:text="'S/. ' + ${#numbers.formatDecimal(item.subtotal,1,2)}"></strong>
                    </td>
                    <td>
                        <!-- Tu controlador usa POST para eliminar, no GET -->
                        <form th:action="@{/carrito/eliminar/{id}(id=${item.productoId})}"
                              method="post">
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('¿Quitar este producto?')">
                                Quitar
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <form th:action="@{/carrito/vaciar}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm"
                        onclick="return confirm('¿Vaciar todo el carrito?')">
                    Vaciar carrito
                </button>
            </form>
            <a href="/" class="btn btn-link">&laquo; Seguir comprando</a>
        </div>

        <!-- Resumen de totales -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Resumen</h5>
                    <div class="d-flex justify-content-between">
                        <span>Subtotal</span>
                        <span th:text="'S/. ' + ${#numbers.formatDecimal(subtotal,1,2)}"></span>
                    </div>
                    <div class="d-flex justify-content-between text-muted small">
                        <span>IGV (18%)</span>
                        <span th:text="'S/. ' + ${#numbers.formatDecimal(igv,1,2)}"></span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fs-5 fw-bold">
                        <span>Total</span>
                        <span th:text="'S/. ' + ${#numbers.formatDecimal(totalConIgv,1,2)}"></span>
                    </div>
                    <a href="/checkout" class="btn btn-primary w-100 mt-3">
                        Continuar con el pago
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
