<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear cuenta - Tienda Virtual</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5" style="max-width:480px">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Crear cuenta</h3>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/registro}" th:object="${usuario}" method="post">
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Nombre *</label>
                        <input type="text" th:field="*{nombre}"
                               class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Apellido *</label>
                        <input type="text" th:field="*{apellido}"
                               class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo electrónico *</label>
                    <input type="email" th:field="*{email}"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña *</label>
                    <input type="password" th:field="*{password}"
                           class="form-control" required minlength="6">
                    <div class="form-text">Mínimo 6 caracteres</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" th:field="*{telefono}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Crear cuenta
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                ¿Ya tienes cuenta?
                <a href="/login">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
