<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar sesión - Tienda Virtual</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5" style="max-width:420px">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Iniciar sesión</h3>

            <!-- Spring Security agrega ?error cuando el login falla -->
            <div th:if="${param.error}" class="alert alert-danger">
                Email o contraseña incorrectos, o tu cuenta está bloqueada temporalmente
            </div>
            <!-- Spring Security agrega ?logout cuando cierras sesión -->
            <div th:if="${param.logout}" class="alert alert-success">
                Sesión cerrada correctamente
            </div>

            <!-- action debe coincidir con loginProcessingUrl en SecurityConfig -->
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="username" class="form-control"
                           required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control"
                           required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Ingresar
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                ¿No tienes cuenta?
                <a href="/registro">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
