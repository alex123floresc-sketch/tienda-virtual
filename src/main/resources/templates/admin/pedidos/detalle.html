<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle del Pedido</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width:800px">
    <a href="/admin/pedidos" class="btn btn-link ps-0">&laquo; Volver a pedidos</a>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <span th:text="'Pedido #' + ${pedido.id}"></span>
            <span th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
        <div class="card-body">

            <!-- Datos del cliente -->
            <h5>Datos del cliente</h5>
            <p class="mb-1">
                <strong th:text="${pedido.usuario.nombre} + ' ' + ${pedido.usuario.apellido}"></strong>
            </p>
            <p class="mb-1 text-muted" th:text="${pedido.usuario.email}"></p>
            <p class="mb-3 text-muted" th:text="${pedido.usuario.telefono}"></p>

            <hr>

            <!-- Productos del pedido -->
            <h5>Productos</h5>
            <table class="table table-sm">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio unit.</th>
                    <th>Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${pedido.detalles}">
                    <td th:text="${d.producto.nombre}"></td>
                    <td th:text="${d.cantidad}"></td>
                    <td th:text="'S/. ' + ${#numbers.formatDecimal(d.precioUnitario,1,2)}"></td>
                    <td th:text="'S/. ' + ${#numbers.formatDecimal(d.subtotal,1,2)}"></td>
                </tr>
                </tbody>
            </table>

            <!-- Totales -->
            <div class="text-end">
                <p class="mb-1">Subtotal: <strong th:text="'S/. ' + ${#numbers.formatDecimal(pedido.subtotal,1,2)}"></strong></p>
                <p class="mb-1">IGV (18%): <strong th:text="'S/. ' + ${#numbers.formatDecimal(pedido.igv,1,2)}"></strong></p>
                <p class="fs-5">Total: <strong th:text="'S/. ' + ${#numbers.formatDecimal(pedido.total,1,2)}"></strong></p>
            </div>

            <hr>

            <!-- Cambiar estado del pedido -->
            <h5>Estado del pedido</h5>
            <form th:action="@{/admin/pedidos/{id}/estado(id=${pedido.id})}" method="post"
                  class="d-flex gap-2">
                <select name="estado" class="form-select" style="max-width:250px">
                    <option value="PENDIENTE" th:selected="${pedido.estado == 'PENDIENTE'}">Pendiente</option>
                    <option value="PAGADO" th:selected="${pedido.estado == 'PAGADO'}">Pagado</option>
                    <option value="ENVIADO" th:selected="${pedido.estado == 'ENVIADO'}">Enviado</option>
                    <option value="ENTREGADO" th:selected="${pedido.estado == 'ENTREGADO'}">Entregado</option>
                </select>
                <button type="submit" class="btn btn-primary">Actualizar estado</button>
            </form>

            <!-- Link a la factura de este pedido -->
            <div class="mt-3" th:if="${factura != null}">
                <a th:href="@{/factura/descargar/{id}(id=${factura.id})}"
                   class="btn btn-outline-success" target="_blank">
                    📄 Descargar factura PDF
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
