<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Categorías</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Gestión de Categorías</h2>
        <button type="button" class="btn btn-primary"
                data-bs-toggle="modal" data-bs-target="#modalNueva">
            + Nueva Categoría
        </button>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categorias}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.nombre}"></td>
            <td th:text="${cat.descripcion}"></td>
            <td>
                    <span class="badge"
                          th:classappend="${cat.activo} ? 'bg-success' : 'bg-secondary'"
                          th:text="${cat.activo} ? 'Activa' : 'Inactiva'">
                    </span>
            </td>
            <td>
                <!-- Abre el modal de edición con los datos de esta fila -->
                <button type="button" class="btn btn-warning btn-sm"
                        data-bs-toggle="modal"
                        th:data-bs-target="'#modalEditar' + ${cat.id}">
                    Editar
                </button>
                <a th:href="@{/admin/categorias/eliminar/{id}(id=${cat.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar esta categoría?')">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Modal: Nueva categoría -->
    <div class="modal fade" id="modalNueva" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/categorias/guardar}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Nueva Categoría</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Un modal de edición por cada categoría -->
    <div class="modal fade" th:each="cat : ${categorias}"
         th:id="'modalEditar' + ${cat.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/categorias/guardar}" method="post">
                    <input type="hidden" name="id" th:value="${cat.id}">
                    <input type="hidden" name="activo" th:value="${cat.activo}">
                    <div class="modal-header">
                        <h5 class="modal-title">Editar Categoría</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" name="nombre" class="form-control"
                                   th:value="${cat.nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="2"
                                      th:text="${cat.descripcion}"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Actualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
