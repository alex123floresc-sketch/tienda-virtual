<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Factura ' + ${factura.numero}">Factura</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width:700px">
    <div class="card shadow-sm">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <h4>TIENDA VIRTUAL S.A.</h4>
                <p class="text-muted mb-0">RUC: 20123456789</p>
                <h5 class="mt-3">FACTURA ELECTRÓNICA</h5>
                <p class="fw-bold" th:text="${factura.numero}"></p>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <p class="small text-muted mb-0">Cliente</p>
                    <p th:text="${factura.pedido.usuario.nombre} + ' ' + ${factura.pedido.usuario.apellido}"></p>
                </div>
                <div class="col text-end">
                    <p class="small text-muted mb-0">Fecha de emisión</p>
                    <p th:text="${#temporals.format(factura.fecha, 'dd/MM/yyyy HH:mm')}"></p>
                </div>
            </div>

            <table class="table table-sm">
                <thead class="table-light">
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>P. unitario</th>
                    <th>Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${factura.pedido.detalles}">
                    <td th:text="${d.producto.nombre}"></td>
                    <td th:text="${d.cantidad}"></td>
                    <td th:text="'S/. ' + ${#numbers.formatDecimal(d.precioUnitario,1,2)}"></td>
                    <td th:text="'S/. ' + ${#numbers.formatDecimal(d.subtotal,1,2)}"></td>
                </tr>
                </tbody>
            </table>

            <div class="text-end">
                <p class="mb-1">Subtotal: S/. <span th:text="${#numbers.formatDecimal(factura.subtotal,1,2)}"></span></p>
                <p class="mb-1">IGV (18%): S/. <span th:text="${#numbers.formatDecimal(factura.igv,1,2)}"></span></p>
                <p class="fs-5 fw-bold">Total: S/. <span th:text="${#numbers.formatDecimal(factura.total,1,2)}"></span></p>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/factura/descargar/{id}(id=${factura.id})}"
                   class="btn btn-success" target="_blank">
                    📄 Descargar PDF
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
