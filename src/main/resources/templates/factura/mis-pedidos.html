<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis pedidos</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-3">Mis pedidos</h2>

    <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-info">
        Aún no tienes pedidos.
        <a href="/" class="alert-link">Ir al catálogo</a>
    </div>

    <div th:unless="${#lists.isEmpty(pedidos)}" class="row row-cols-1 g-3">
        <div class="col" th:each="p : ${pedidos}">
            <div class="card shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <p class="mb-1 fw-bold" th:text="'Pedido #' + ${p.id}"></p>
                        <p class="mb-1 text-muted small"
                           th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy HH:mm')}"></p>
                        <span class="badge"
                              th:classappend="${p.estado == 'PENDIENTE'} ? 'bg-warning text-dark' :
                                              (${p.estado == 'PAGADO'} ? 'bg-info' :
                                              (${p.estado == 'ENVIADO'} ? 'bg-primary' : 'bg-success'))"
                              th:text="${p.estado}">
                        </span>
                    </div>
                    <div class="text-end">
                        <p class="fs-5 fw-bold mb-1"
                           th:text="'S/. ' + ${#numbers.formatDecimal(p.total,1,2)}"></p>
                        <a th:href="@{/factura/{id}(id=${p.id})}"
                           class="btn btn-outline-primary btn-sm">Ver factura</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
